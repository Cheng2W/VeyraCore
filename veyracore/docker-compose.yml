version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: veyracore_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-veyracore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-veyracore_secret}
      POSTGRES_DB: ${POSTGRES_DB:-veyracore}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - veyracore_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-veyracore}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: veyracore_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-veyracore_redis_secret}
    volumes:
      - redis_data:/data
    networks:
      - veyracore_network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: veyracore_backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-veyracore}:${POSTGRES_PASSWORD:-veyracore_secret}@db:5432/${POSTGRES_DB:-veyracore}
      REDIS_URL: redis://:${REDIS_PASSWORD:-veyracore_redis_secret}@redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - veyracore_network
    restart: unless-stopped

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: veyracore_celery_worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-veyracore}:${POSTGRES_PASSWORD:-veyracore_secret}@db:5432/${POSTGRES_DB:-veyracore}
      REDIS_URL: redis://:${REDIS_PASSWORD:-veyracore_redis_secret}@redis:6379/0
    command: celery -A app.celery_app worker --loglevel=info
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - veyracore_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: veyracore_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - veyracore_network
    restart: unless-stopped

networks:
  veyracore_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
